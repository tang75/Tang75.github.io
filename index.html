<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HomeBP Insight</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font: 18px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background: #f8f9fa; color: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 48px 40px; max-width: 520px; text-align: center; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .sub { color: #5a6a7a; font-size: 15px; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 14px; }
    a { display: block; padding: 16px 24px; border-radius: 14px; text-decoration: none; font-weight: 650; font-size: 17px; transition: all .15s; }
    a.patient { background: rgba(27,122,61,.08); border: 1px solid rgba(27,122,61,.25); color: #1b7a3d; }
    a.patient:hover { background: rgba(27,122,61,.15); }
    a.clinician { background: rgba(44,93,205,.08); border: 1px solid rgba(44,93,205,.25); color: #2c5dcd; }
    a.clinician:hover { background: rgba(44,93,205,.15); }
    .desc { font-size: 13px; font-weight: 400; color: #5a6a7a; margin-top: 4px; }
    .privacy { margin-top: 28px; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HomeBP Insight</h1>
    <div class="sub">Home Blood Pressure Visualization</div>
    <div class="links">
      <a href="patientBP.html" class="patient">
        Patient View
        <div class="desc">Large fonts, simple layout &mdash; designed for easy reading</div>
      </a>
      <a href="clinicianBP.html" class="clinician">
        Clinician View
        <div class="desc">Full dashboard with medication response, clinical insights &amp; configurable goals</div>
      </a>
    </div>
    <div class="privacy">All processing is local &mdash; nothing leaves your computer.</div>
  </div>
</body>
</html>
